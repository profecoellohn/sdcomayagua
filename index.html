<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SDC Master | ERP Cloud</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0f19">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg-dark: #0b0f19; --panel-bg: #151e2e; --accent: #3b82f6; --text-main: #f8fafc; --text-muted: #94a3b8; --success: #10b981; --border: #1e293b; --radius: 16px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 800; font-size: 20px; } .logo span { color: var(--accent); }
        nav { display: flex; overflow-x: auto; padding: 10px; gap: 5px; background: var(--bg-dark); }
        nav button { background: transparent; border: none; color: var(--text-muted); padding: 8px 15px; border-radius: var(--radius); font-size: 13px; font-weight: 600; }
        nav button.activo { background: var(--accent); color: white; }
        main { flex-grow: 1; overflow-y: auto; padding: 20px; }
        footer { padding: 15px; text-align: center; font-size: 10px; color: var(--text-muted); background: var(--bg-dark); border-top: 1px solid var(--border); }
        .vista { display: none; } .vista.activa { display: block; }
        
        /* Tarjetas Modernas */
        .card { background: var(--panel-bg); border-radius: var(--radius); padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .grid-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { text-align: center; padding: 15px; background: var(--bg-dark); border-radius: var(--radius); border: 1px solid var(--border); }
        .stat-card h3 { font-size: 10px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
        .stat-card p { font-size: 18px; font-weight: 700; }
        
        /* Botones Promo */
        .btn-promo { background: var(--bg-dark); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .btn-promo.activo { border-color: var(--accent); background: rgba(59, 130, 246, 0.2); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: flex-end; z-index: 1000; opacity: 0; pointer-events: none; }
        .modal-overlay.activo { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--panel-bg); width: 100%; border-radius: 24px 24px 0 0; padding: 20px; max-height: 90vh; overflow-y: auto; }
        
        .btn-main { background: var(--accent); color: white; border: none; padding: 15px; border-radius: var(--radius); font-weight: 700; width: 100%; }
        .m-img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px; border-radius: var(--radius); }
    </style>
</head>
<body>

    <header>
        <div class="logo">SDC <span>Master</span></div>
        <div class="time-badge" id="fecha-hora"></div>
    </header>

    <nav>
        <button class="activo" onclick="cambiarVista('inicio', this)">Inicio</button>
        <button onclick="cambiarVista('catalogo', this)">Catálogo</button>
        <button onclick="cambiarVista('carrito', this)">Carrito</button>
        <button onclick="cambiarVista('ventas', this)">Ventas</button>
        <button onclick="cambiarVista('dashboard', this)">Finanzas</button>
    </nav>

    <main>
        <section id="vista-inicio" class="vista activa">
            <div class="card" style="background: linear-gradient(135deg, #1e3a8a, #0b0f19);">
                <h1 style="font-size: 20px;">¡Hola, Profe Coello! 👋</h1>
                <p id="saludo-fecha" style="font-size: 12px; color: var(--text-muted);"></p>
                <div class="grid-dash" style="margin-top:20px;">
                    <button class="btn-main" onclick="cambiarVista('catalogo', document.querySelectorAll('nav button')[1])">Nueva Venta</button>
                    <button class="btn-outline" style="background:transparent; border:1px solid white;" onclick="cambiarVista('cotizaciones', document.querySelectorAll('nav button')[3])">Ver Cotizaciones</button>
                </div>
            </div>
            <div class="grid-dash">
                <div class="stat-card"><h3>Artículos</h3><p id="op-tot">0</p></div>
                <div class="stat-card"><h3>Bajo Stock</h3><p id="op-baj">0</p></div>
                <div class="stat-card card-full"><h3>Valor Inventario</h3><p id="op-inv">Lps. 0</p></div>
            </div>
        </section>

        <section id="vista-catalogo" class="vista">
            <input type="text" id="buscador" class="input-box" placeholder="Buscar producto..." onkeyup="buscarProducto()" style="margin-bottom: 15px;">
            <button class="btn-main" style="margin-bottom: 15px;" onclick="abrirModalNuevo()">+ Agregar Producto</button>
            <div id="contenedor-productos" class="grid-catalogo"></div>
        </section>

        <section id="vista-carrito" class="vista">
            <div id="lista-carrito"></div>
            <button class="btn-main" id="btn-procesar-venta" onclick="procesarVenta()">Confirmar Venta</button>
        </section>

        <section id="vista-ventas" class="vista">
            <h2 style="margin-bottom: 15px;">Historial de Ventas</h2>
            <div id="lista-ventas"></div>
        </section>

        <section id="vista-dashboard" class="vista">
            <h2>Finanzas</h2>
            <p id="dash-ventas">Total Ventas: Lps. 0</p>
        </section>
    </main>

    <footer>SDC ERP • Soluciones Digitales Comayagua</footer>

    <div class="modal-overlay" id="modal-producto">
        <div class="modal-content">
            <img id="m-img" class="m-img">
            <h2 id="m-nombre"></h2>
            <p id="m-precio" style="color:var(--success); font-size:20px; font-weight:700;"></p>
            <div id="m-promos-container" style="display:flex; gap:5px; margin: 15px 0;"></div>
            <div id="m-variantes" style="margin: 15px 0;"></div>
            <button class="btn-main" onclick="agregarDesdeModal()">Añadir al Carrito</button>
            <button class="btn-cerrar" onclick="cerrarModal()" style="margin-top:10px; width:100%; background:transparent; border:none; color:var(--text-muted);">Cerrar</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-nuevo-producto">
        <div class="modal-content">
            <h2>Nuevo Producto</h2>
            <div class="grid-2-col" style="margin: 15px 0;">
                <label class="btn-foto-peq">📁 Subir<input type="file" onchange="actualizarFotoNp(this, 'main')"></label>
                <label class="btn-foto-peq">📷 Tomar<input type="file" capture="environment" onchange="actualizarFotoNp(this, 'main')"></label>
            </div>
            <img id="np-img-preview" style="display:none; width:100%; height:150px; object-fit:contain;">
            <input type="text" id="np-nombre" class="input-box" placeholder="Nombre">
            <input type="number" id="np-precio" class="input-box" placeholder="Precio">
            <button class="btn-main" id="btn-guardar-firebase" onclick="guardarNuevoProductoLocal()">Guardar en Nube</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = { /* ... TU CONFIGURACIÓN ... */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Funciones Nube
        window.cargarDesdeFirebase = async function() {
            const querySnapshot = await getDocs(collection(db, "productos"));
            let prods = [];
            querySnapshot.forEach((doc) => prods.push({ id: doc.id, ...doc.data() }));
            return prods;
        };
        
        window.registrarVentaFirebase = async function(datos) {
            await addDoc(collection(db, "ventas"), datos);
        };
        
        window.actualizarFirebase = async function(id, datos) {
            await updateDoc(doc(db, "productos", id), datos);
        };
    </script>
    
    <script>
        // Lógica de Ventas con actualización de inventario
        async function procesarVenta() {
            if(carrito.length === 0) return alert("Carrito vacío");
            
            try {
                let datosOrden = { /* ... datos ... */ };
                await window.registrarVentaFirebase(datosOrden);
                
                // Reducción de Stock
                carrito.forEach(async (item) => {
                    let prod = baseDeDatos.find(p => p.id === item.id);
                    let v = prod.variantes.find(v => v.nombre === item.variante);
                    v.stock -= item.cantidad;
                    await window.actualizarFirebase(item.id, { variantes: prod.variantes });
                });

                mostrarToast("Venta Exitosa");
                limpiarCarrito();
            } catch(e) { alert("Error al vender"); }
        }
        
        // Renderizado de Ventas (Para la pestaña nueva)
        async function renderVentas() {
            // Aquí puedes hacer un getDocs(collection(db, "ventas"))
        }
    </script>
</body>
</html>
